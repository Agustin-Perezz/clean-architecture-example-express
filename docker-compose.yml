version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=development
    depends_on:
      - db

  db:
    image: ubuntu:latest
    command: ['sleep', 'infinity']
    volumes:
      - sqlite_data:/data
    labels:
      - 'kompose.service.type=external'

volumes:
  sqlite_data:
    driver: local